server:
  port: 8080

spring:
  application:
    name: event-management-system
  
  # Persistent database setup (H2 File-based)
  datasource:
    url: jdbc:h2:file:./data/eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: true
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true # Ensures schema is created before data.sql runs

# Security Config parameters
security:
  jwt:
    secret-key: dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLWtleS1mb3Itand0LWF1dGhlbnRpY2F0aW9uLWV2ZW50LW1hbmFnZW1lbnQtc3lzdGVt
    expiration-time: 86400000 # 24 hours in ms

---
# MySQL Profile config. Run with: --spring.profiles.active=mysql
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/eventdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
